name: deploy
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Setup quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.35

      - run: quarto --version
      - run: quarto add --no-prompt quarto-ext/fontawesome
      - run: quarto add --no-prompt mcanouil/quarto-collapse-output@1.4.0
      - run: quarto add --no-prompt royfrancis/quarto-accordion

      - name: Render quarto
        uses: quarto-dev/quarto-actions/render@v2
        with:
          to: html
          path: index.qmd

      - name: Configure Github Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
